<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mochila do Victor</title>
    <style>
        body {
            background-color: #1e90ff;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .materias {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .materia {
            background-color: #ffffff;
            color: #1e90ff;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 150px;
            transition: 0.3s;
        }

        .materia:hover {
            background-color: #e0e0e0;
        }

        .anotacao {
            margin-top: 30px;
            display: none;
        }

        textarea {
            width: 60%;
            height: 150px;
            border-radius: 10px;
            padding: 10px;
            border: none;
            resize: none;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .salvar {
            background-color: #28a745;
            color: white;
        }

        .sair {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Mochila do Victor 🎒</h1>
    <p>Clique na matéria para fazer anotações</p>

    <div id="menu" class="materias">
        <div class="materia" onclick="abrirMateria('matematica')">
            Matemática
        </div>
        <div class="materia" onclick="abrirMateria('portugues')">
            Português
        </div>
    </div>

    <div id="matematica" class="anotacao">
        <h2>Anotações de Matemática</h2>
        <textarea id="texto-matematica"></textarea><br>
        <button class="salvar" onclick="salvar('matematica')">Salvar</button>
        <button class="sair" onclick="sair()">Sair</button>
    </div>

    <div id="portugues" class="anotacao">
        <h2>Anotações de Português</h2>
        <textarea id="texto-portugues"></textarea><br>
        <button class="salvar" onclick="salvar('portugues')">Salvar</button>
        <button class="sair" onclick="sair()">Sair</button>
    </div>

    <script>
        function abrirMateria(materia) {
            document.getElementById('menu').style.display = 'none';

            document.getElementById('matematica').style.display = 'none';
            document.getElementById('portugues').style.display = 'none';

            document.getElementById(materia).style.display = 'block';

            carregar(materia);
        }

        function salvar(materia) {
            let texto = document.getElementById('texto-' + materia).value;
            localStorage.setItem(materia, texto);
            alert("Anotação salva!");
        }

        function carregar(materia) {
            let textoSalvo = localStorage.getItem(materia);
            if (textoSalvo) {
                document.getElementById('texto-' + materia).value = textoSalvo;
            }
        }

        function sair() {
            document.getElementById('menu').style.display = 'flex';

            document.getElementById('matematica').style.display = 'none';
            document.getElementById('portugues').style.display = 'none';
        }
    </script>

</body>
</html>
