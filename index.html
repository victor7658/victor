<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mochila do Victor</title>
    <style>
        body {
            background-color: #1e90ff;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .materias {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .materia {
            background-color: #ffffff;
            color: #1e90ff;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 180px;
            transition: 0.3s;
        }

        .materia:hover {
            background-color: #e0e0e0;
        }

        .anotacao {
            margin-top: 30px;
            display: none;
        }

        textarea {
            width: 70%;
            height: 150px;
            border-radius: 10px;
            padding: 10px;
            border: none;
            resize: none;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .salvar {
            background-color: #28a745;
            color: white;
        }

        .sair {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Mochila do Victor 🎒</h1>
    <p>Clique na matéria para fazer anotações</p>

    <div id="menu" class="materias"></div>

    <div id="area-anotacao" class="anotacao">
        <h2 id="titulo-materia"></h2>
        <textarea id="texto"></textarea><br>
        <button class="salvar" onclick="salvar()">Salvar</button>
        <button class="sair" onclick="sair()">Sair</button>
    </div>

    <script>
        const materias = [
            "Matemática",
            "Português",
            "Educação Física",
            "Filosofia",
            "Historia",
            "Geografia",
            "Biologia",
            "Artes",
            "Sistemas Operacionais",
            "Praticas Experimentais",
            "Projeto de Vida",
            "Gestão de Tempo",
            "Poo Java",
            "Noções de Robótica",
            "Programação Web",
            "Fisica",
            "Arquitetura e Manutenção de Computadores",
            "Quimica",
            "Educação Financeira",
            "Logica de Programação",
            "Estudos Orientados",
            "HTML",
            "Sociologia",
            "Ingles"
        ];

        let materiaAtual = "";

        const menu = document.getElementById("menu");

        materias.forEach(m => {
            const div = document.createElement("div");
            div.className = "materia";
            div.innerText = m;
            div.onclick = () => abrirMateria(m);
            menu.appendChild(div);
        });

        function abrirMateria(materia) {
            materiaAtual = materia;
            document.getElementById("menu").style.display = "none";
            document.getElementById("area-anotacao").style.display = "block";
            document.getElementById("titulo-materia").innerText = "Anotações de " + materia;

            carregar();
        }

        function salvar() {
            let texto = document.getElementById("texto").value;
            localStorage.setItem(materiaAtual, texto);
            alert("Anotação salva!");
        }

        function carregar() {
            let textoSalvo = localStorage.getItem(materiaAtual);
            document.getElementById("texto").value = textoSalvo ? textoSalvo : "";
        }

        function sair() {
            document.getElementById("menu").style.display = "flex";
            document.getElementById("area-anotacao").style.display = "none";
        }
    </script>

</body>
</html>
